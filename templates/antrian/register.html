{% extends 'base.html' %}

{% block title %}Pendaftaran Pasien Baru - RS SehatPlus{% endblock %}

{% block content %}
<!-- Kembali ke beranda -->
<div style="display: flex; justify-content: flex-start; width: 100%; margin-bottom: 1rem;">
    <a href="{% url 'beranda' %}" class="back-link" style="margin-top: 0; margin-bottom: 0;">
        <i class='bx bx-left-arrow-alt'></i> Kembali ke Beranda
    </a>
</div>

<div style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 60vh; padding: 2rem 0;">
    <div class="card" style="width: 100%; max-width: 500px; padding: 3rem 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div style="width: 64px; height: 64px; border-radius: 16px; background: #f3e8ff; color: var(--accent); display: inline-flex; align-items: center; justify-content: center; font-size: 2rem; margin-bottom: 1rem;">
                <i class='bx bx-user-plus'></i>
            </div>
            <h2 style="color: var(--primary-dark); margin-bottom: 0.5rem; font-size: 1.75rem; font-weight: 800;">Daftar Baru</h2>
            <p style="color: var(--text-muted); font-size: 0.95rem;">Lengkapi data diri Anda untuk pendaftaran pasien pertama kali.</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label for="nik" style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-main); font-size: 0.95rem;">Nomor Induk Kependudukan (NIK) <span style="color: #ef4444;">*</span></label>
                <div style="position: relative;">
                    <i class='bx bx-id-card' style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.25rem;"></i>
                    <input type="text" id="nik" name="nik" required pattern="\d{16}" title="NIK harus 16 digit angka" class="form-control" placeholder="16 Digit NIK KTP Anda" style="padding-left: 2.75rem; height: 48px; border-radius: 12px;">
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label for="nama" style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-main); font-size: 0.95rem;">Nama Lengkap (Sesuai KTP) <span style="color: #ef4444;">*</span></label>
                <div style="position: relative;">
                    <i class='bx bx-user' style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.25rem;"></i>
                    <input type="text" id="nama" name="nama" required class="form-control" placeholder="Contoh: Budi Santoso" style="padding-left: 2.75rem; height: 48px; border-radius: 12px;">
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 2rem;">
                <label for="no_hp" style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-main); font-size: 0.95rem;">Nomor HP / WhatsApp <span style="color: #ef4444;">*</span></label>
                <div style="position: relative;">
                    <i class='bx bx-phone' style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.25rem;"></i>
                    <input type="text" id="no_hp" name="no_telepon" required class="form-control" placeholder="Contoh: 081234567890" style="padding-left: 2.75rem; height: 48px; border-radius: 12px;">
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; height: 48px; border-radius: 12px; font-weight: 600; font-size: 1rem; box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);">
                Daftar Sebagai Pasien
            </button>
            <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
                Sudah pernah berobat? <a href="{% url 'login_pasien' %}" style="color: var(--primary); font-weight: 600;">Masuk di sini</a>
            </div>
        </form>
    </div>
</div>

<style>
    .form-control:focus {
        border-color: var(--primary);
        outline: none;
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    }
    a:hover {
        color: var(--primary-dark) !important;
    }
</style>
{% endblock %}
